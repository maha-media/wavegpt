AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Signals Trading Dashboard

Globals:
  Function:
    Timeout: 900
    MemorySize: 512

Parameters:
  DomainName:
    Type: String
    Default: trader.mahamedia.us
  HostedZoneId:
    Type: String
    Description: Route53 hosted zone ID for mahamedia.us
  CertificateArn:
    Type: String
    Description: ACM certificate ARN for trader.mahamedia.us (us-east-1)

Resources:
  DashboardFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: config.asgi.handler
      Runtime: python3.12
      CodeUri: ../
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM
      Environment:
        Variables:
          DJANGO_SETTINGS_MODULE: config.settings
          DEBUG: 'false'
          ALLOWED_HOSTS: trader.mahamedia.us
          TASTYTRADE_CLIENT_SECRET: '{{resolve:secretsmanager:signals/tastytrade:SecretString:client_secret}}'
          TASTYTRADE_REFRESH_TOKEN: '{{resolve:secretsmanager:signals/tastytrade:SecretString:refresh_token}}'
          TASTYTRADE_SANDBOX: 'false'
          LLM_PROVIDER: bedrock
          BEDROCK_MODEL_ID: anthropic.claude-sonnet-4-20250514-v1:0
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModelWithResponseStream
                - bedrock:InvokeModel
              Resource: '*'
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: '*'

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Aliases:
          - !Ref DomainName
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        DefaultCacheBehavior:
          TargetOriginId: LambdaOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader
        Origins:
          - Id: LambdaOrigin
            DomainName: !Select [2, !Split ['/', !GetAtt DashboardFunctionUrl.FunctionUrl]]
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
        Enabled: true

  DNSRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront hosted zone (constant)

Outputs:
  FunctionUrl:
    Value: !GetAtt DashboardFunctionUrl.FunctionUrl
  CloudFrontUrl:
    Value: !Sub 'https://${DomainName}'
